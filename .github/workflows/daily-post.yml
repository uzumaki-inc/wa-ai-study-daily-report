name: Daily AI News Post

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 = JST 09:00（cron自体はUTC固定）
  workflow_dispatch: # 手動実行対応

permissions:
  contents: write
  pages: write

env:
  TZ: Asia/Tokyo

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # dedup_store.json をキャッシュから復元
      - uses: actions/cache@v4
        with:
          path: dedup_store.json
          key: dedup-store-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            dedup-store-${{ github.ref_name }}-
            dedup-store-

      - run: npm run post:now
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          PAGES_BASE_URL: https://uzumaki-inc.github.io/wa-ai-study-daily-report

      # 生成されたWebビューをコミット・push
      - name: Deploy web view to GitHub Pages
        timeout-minutes: 2
        run: |
          if [ -d "docs/daily" ] && [ "$(ls -A docs/daily/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/daily/
            if ! git diff --staged --quiet; then
              git commit -m "docs: AIニュース $(date +%Y-%m-%d) のWebビューを追加"
              git push
            else
              echo "変更なし。デプロイをスキップ"
            fi
          else
            echo "Webビューが生成されなかったため、デプロイをスキップ"
          fi

name: Daily AI News Post

on:
  schedule:
    - cron: '0 0 * * 1-5' # UTC 00:00 = JST 09:00 月〜金のみ（cron自体はUTC固定）
  workflow_dispatch: # 手動実行対応

permissions:
  contents: write
  pages: write

env:
  TZ: Asia/Tokyo

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # dedup_store.json をキャッシュから復元
      - uses: actions/cache@v4
        with:
          path: dedup_store.json
          key: dedup-store-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            dedup-store-${{ github.ref_name }}-
            dedup-store-

      # Step 1: RSS取得 → Claude要約 → Webビュー生成（Slack投稿はまだしない）
      - name: Prepare news summary
        run: npm run prepare:news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          PAGES_BASE_URL: https://uzumaki-inc.github.io/wa-ai-study-daily-report

      # Step 2: 生成されたWebビューをコミット・push（GitHub Pages配信）
      - name: Deploy web view to GitHub Pages
        timeout-minutes: 2
        run: |
          if [ -d "docs/daily" ] && [ "$(ls -A docs/daily/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/daily/
            if ! git diff --staged --quiet; then
              git commit -m "docs: AIニュース $(date +%Y-%m-%d) のWebビューを追加"
              git push
            else
              echo "変更なし。デプロイをスキップ"
            fi
          else
            echo "Webビューが生成されなかったため、デプロイをスキップ"
          fi

      # Step 3: Webビューがデプロイされた後にSlack投稿
      - name: Post to Slack
        run: npm run post:slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
